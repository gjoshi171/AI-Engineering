    "google-genai>=2.9.0",
    "groq>=1.5.0",
    "ipykernel>=7.3.0",
    "matplotlib>=3.11.0",
    "openai>=2.43.0",
    "panda>=0.3.1",
    "pandas>=3.0.3",
    "python-dotenv>=1.2.2",
]

[tool.uv.workspace]
